services:
  # Backend API
  - type: web
    name: marketplace-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && alembic upgrade head
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MEILI_HOST
        sync: false
      - key: MEILI_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://marketplace-web.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /api/health

  # Frontend
  - type: web
    name: marketplace-web
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://marketplace-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://marketplace-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
